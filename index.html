<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formula Web Racing</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <!-- HUD -->
        <div id="hud" class="hidden">
            <div class="hud-panel left">
                <div class="minimap-container">
                    <canvas id="minimap" width="200" height="200"></canvas>
                </div>
                <div class="hud-spacer"></div>
                <div class="speed-container">
                    <span id="speed">0</span>
                    <span class="unit">KM/H</span>
                </div>
                <div class="gear-container">
                    <span>GEAR</span>
                    <span id="gear">N</span>
                </div>
            </div>
            <div class="hud-panel right">
                <div class="lap-container">
                    <span>LAP</span>
                    <span id="lap">1/3</span>
                </div>
                <div class="time-container">
                    <span>TIME</span>
                    <span id="time">00:00.00</span>
                </div>
                <div class="best-time-container">
                    <span>BEST</span>
                    <span id="best-time">--:--.--</span>
                </div>
            </div>
        </div>

        <!-- Start Menu -->
        <div id="start-screen" class="overlay">
            <div class="menu-content">
                <h1>FORMULA <span class="neon-red">WEB</span></h1>
                <p class="subtitle">HTML5 Canvas Racing Experience</p>
                
                <div class="track-selection">
                    <h3>SELECT TRACK</h3>
                    <div class="track-buttons">
                        <button class="track-btn active" data-track="0">MONZA (FAST)</button>
                        <button class="track-btn" data-track="1">SUZUKA (TECHNICAL)</button>
                        <button class="track-btn" data-track="2">OVAL (SPEED)</button>
                    </div>
                </div>

                <div class="controls">
                    <p>Drive: <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> or <kbd>↑</kbd><kbd>←</kbd><kbd>↓</kbd><kbd>→</kbd></p>
                    <p>Drift/Handbrake: <kbd>SPACE</kbd></p>
                    <p class="audio-note">🔊 Audio starts automatically when game begins</p>
                </div>
                <button id="start-btn" class="neon-button">START ENGINE</button>
            </div>
        </div>

        <!-- Game Over Menu -->
        <div id="game-over-screen" class="overlay hidden">
            <div class="menu-content">
                <h1>RACE <span class="neon-red">FINISHED</span></h1>
                <div class="stats">
                    <p>Total Time: <span id="final-time">00:00.00</span></p>
                    <p>Best Lap: <span id="final-best">00:00.00</span></p>
                </div>
                <button id="restart-btn" class="neon-button">PLAY AGAIN</button>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
